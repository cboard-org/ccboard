version: 2.1

orbs:
  win: circleci/windows@5.0

jobs:
  build_cboard:
    docker:
      - image: cimg/node:22.14.0
    resource_class: large
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Decrypt the Google services file 
          command: |
            openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  google-services.json.cypher \
            -out google-services.json \
            -k $KEY
      - run:
          name: Decrypt the Google services info .plist file 
          command: |
            openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  GoogleService-info.plist.cipher \
            -out GoogleService-info.plist \
            -k $KEY
      - run: 
          name: Sync cboard module 
          command: |
            git submodule sync
            git submodule update --init
      - run:
          name: Install cboard
          command: |
            export NODE_OPTIONS=--max-old-space-size=8192
            cd cboard
            git checkout master 
            git pull
            yarn install
      - run:
          name: Replace cboard files 
          command: |
            cd cboard
            sudo sed -i 's+"homepage": "https://app.cboard.io",+"homepage": ".",+g' package.json
            sudo sed -i 's+<meta charset="utf-8">+<meta charset="utf-8"><script src="cordova.js"></script>+g' public/index.html
      - run:
          name: Build cboard
          command: |
            export NODE_OPTIONS=--max-old-space-size=8192
            cd cboard
            yarn build --verbose 
      - persist_to_workspace:
          root: cboard
          paths:
            - build/*
      - run:
          name: Generate zip file
          command: |
            cd cboard 
            zip build.zip -r build
      - store_artifacts:
          path: ./cboard/build.zip
      - store_artifacts:
          path: ./cboard/package.json
      - store_artifacts:
          path: ./cboard/public/index.html
  build_android:
    docker:
      - image: cimg/android:2026.02.1-node
    working_directory: ~/repo
    environment:
      JVM_OPTS: -Xmx3200m
    steps:
      - checkout
      - run:
          name: Decrypt the Google services file 
          command: |
            openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  google-services.json.cypher \
            -out google-services.json \
            -k $KEY
      - run:
          name: Decrypt the Google services info .plist file 
          command: |
            openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  GoogleService-info.plist.cipher \
            -out GoogleService-info.plist \
            -k $KEY
      - run:
          name: Decrypt the keystore file 
          command: |
            openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  ccboard.keystore.cypher \
            -out ccboard.keystore \
            -k $KEY    
      - run: 
          name: Install gradle
          command: |
            wget https://services.gradle.org/distributions/gradle-6.8.1-bin.zip -P /tmp
            sudo unzip -d /opt/gradle /tmp/gradle-*.zip
            echo 'export GRADLE_HOME=/opt/gradle/gradle-6.8.1' >> $BASH_ENV
            echo 'export PATH=$PATH:/opt/gradle/gradle-6.8.1/bin' >> $BASH_ENV
            source $BASH_ENV
      - run:
          name: Install Cordova
          command: |
            sudo npm install -g cordova
            mkdir www
            mkdir /tmp/workspace
      - run:
          name: Install dependencias 
          command: |
            yarn install --cache-folder ~/.cache/yarn
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Copy Build
          command: |
            cp -R /tmp/workspace/build/. www
            ls -a www
      - run:
          name: Install jdk 17 
          command: |
            sudo apt-get update && sudo apt-get upgrade
            sudo apt-get install openjdk-17-jdk
      - run:
          name: Install build-tools 34.0.0
          command: |
            sdkmanager "build-tools;34.0.0"
            sdkmanager --list
      - run:
          name: Build Android 
          command: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            export PATH=$JAVA_HOME/bin:$PATH
            sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
            cordova platform add android --noresources
            cordova build android --release --verbose
            cordova build android --verbose
            cp platforms/android/app/build/outputs/bundle/release/app-release.aab ccboard.aab
            cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ccboard-debug.apk
            $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 ccboard.aab cboard.aab
            $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 ccboard-debug.apk cboard-debug.apk
            $JAVA_HOME/bin/jarsigner -verbose -storepass 'morning ' -sigalg SHA1withRSA -digestalg SHA1 -keystore ccboard.keystore cboard.aab ccboard
            $JAVA_HOME/bin/jarsigner -verbose -storepass 'morning ' -sigalg SHA1withRSA -digestalg SHA1 -keystore ccboard.keystore cboard-debug.apk ccboard
            mkdir -p /tmp/apk
            cp -r cboard.aab /tmp/apk
            cp -r cboard-debug.apk /tmp/apk
      - store_artifacts:
          path: /tmp/apk
          destination: apks
  build_electron:
    executor:
      name: win/default
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Install Node 22.14.0	
          command: |
            nvm list
            nvm install 22.14.0	
            nvm use 22.14.0	  
      - run:
          name: Verify node, npm and nvm version
          command: |
            node -v
            npm -v
            nvm version
      - run:
          name: Install cordova
          command: |
            npm install -g cordova
            mkdir www
            mkdir -p ./tmp/workspace
      - run:
          name: Install dependecies
          command: |
            npm i
      - attach_workspace:
          at: ./tmp/workspace
      - run:
          name: Copy Build
          command: |
            Copy-Item ./tmp/workspace/build/* ./www -recurse
            "{0:N2}" -f ((Get-ChildItem -path ./www -recurse | Measure-Object -property length -sum ).sum /1MB) + " MB"
            Get-ChildItem ./www
            Get-ChildItem .
      - run:
          name: Add Electron Platform
          command: |
            cordova platform add electron@3.0.0 --noresources
      - run:
          name: Build Electron App
          command: |
            $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
            $env:WIN_CSC_KEY_PASSWORD = $CSC_KEY_PASSWORD
            cordova build electron --release 
            mkdir ./tmp/exe
            Copy-Item ./platforms/electron/build/*.exe ./tmp/exe
      - store_artifacts:
          path: ./tmp/exe
          destination: exe
  build_ios:
    macos:
      xcode: "26.3.0"
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Decrypt the Google services info .plist file
          command: |
            openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  GoogleService-info.plist.cipher \
            -out GoogleService-info.plist \
            -k $KEY
      - run:
          name: Decrypt the Google services file 
          command: |
            openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  google-services.json.cypher \
            -out google-services.json \
            -k $KEY
      - run:
          name: Decode App Store Connect API Key
          command: |
            mkdir -p ~/.appstoreconnect/private_keys
            echo "$ASC_PRIVATE_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
            chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
      - run:
          name: Install Node 22.14.0
          command: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 22.14.0
            nvm use 22.14.0
            nvm alias default 22.14.0
            echo 'export NVM_DIR="$HOME/.nvm"' >> $BASH_ENV
            echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $BASH_ENV
      - run:
          name: Verify node and npm version
          command: |
            node -v
            npm -v
      - run:
          name: Install Cordova
          command: |
            npm install -g cordova
            mkdir www
            cordova --version
      - run:
          name: Install dependencies
          command: |
            npm install
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Copy Build
          command: |
            cp -R /tmp/workspace/build/. www
            ls -a www
      - run:
          name: Set iOS bundle ID
          command: |
            sed -i '' 's/id="com.unicef.cboard"/id="com.cboardorg.cboard"/' config.xml
            echo "Bundle ID set to:"
            grep 'widget id=' config.xml
      - run:
          name: Install and update CocoaPods
          command: |
            sudo gem update --system 4.0.7
            sudo gem install cocoapods
            pod setup
            pod repo update
      - run:
          name: Add iOS Platform
          command: |
            cordova platform add ios --noresources
      - run:
          name: Remove keyboard plugin (iOS incompatible)
          command: |
            cordova plugin remove cordova-plugin-ionic-keyboard --nosave
      - run:
          name: Copy GoogleService-info.plist
          command: |
            cp GoogleService-info.plist "platforms/ios/AACCboard/"
      - run:
          name: Set Team ID in ExportOptions.plist
          command: |
            /usr/libexec/PlistBuddy -c "Add :teamID string $APPLE_TEAM_ID" ExportOptions.plist || \
            /usr/libexec/PlistBuddy -c "Set :teamID $APPLE_TEAM_ID" ExportOptions.plist
      - run:
          name: Import iOS Distribution Certificate
          command: |
            # Create isolated keychain
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security list-keychains -s build.keychain $(security list-keychains | xargs)
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain

            # Decode and import the distribution certificate
            echo "$IOS_DISTRIBUTION_CERT_P12" | base64 --decode > /tmp/distribution.p12
            security import /tmp/distribution.p12 \
              -k build.keychain \
              -P "$IOS_DISTRIBUTION_CERT_PASSWORD" \
              -T /usr/bin/codesign \
              -T /usr/bin/xcodebuild
            security set-key-partition-list \
              -S apple-tool:,apple: \
              -s -k "$KEYCHAIN_PASSWORD" build.keychain

            # Verify the cert is visible
            security find-identity -v -p codesigning build.keychain
      - run:
          name: Build iOS App
          command: |
            REPO_ROOT=$(pwd)

            # Prepare (regenerates xcconfig files from config.xml)
            cordova prepare ios

            # Patch xcconfigs AFTER prepare (prepare overwrites them)
            sed -i '' 's/CODE_SIGN_IDENTITY = iPhone Developer/CODE_SIGN_IDENTITY = Apple Development/g' \
              platforms/ios/cordova/build.xcconfig
            sed -i '' 's/CODE_SIGN_IDENTITY\[sdk=iphoneos\*\] = iPhone Developer/CODE_SIGN_IDENTITY[sdk=iphoneos*] = Apple Development/g' \
              platforms/ios/cordova/build.xcconfig
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10\.2/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' \
              platforms/ios/cordova/build.xcconfig

            # Patch build-release.xcconfig (also regenerated by cordova prepare)
            sed -i '' 's/CODE_SIGN_IDENTITY = iPhone Distribution/CODE_SIGN_IDENTITY = Apple Development/g' \
              platforms/ios/cordova/build-release.xcconfig
            sed -i '' 's/CODE_SIGN_IDENTITY\[sdk=iphoneos\*\] = iPhone Distribution/CODE_SIGN_IDENTITY[sdk=iphoneos*] = Apple Development/g' \
              platforms/ios/cordova/build-release.xcconfig

            cd platforms/ios
            xcodebuild \
              -workspace AACCboard.xcworkspace \
              -scheme AACCboard \
              -configuration Release \
              -sdk iphoneos \
              -destination "generic/platform=iOS" \
              -archivePath $(pwd)/build/AACCboard.xcarchive \
              -allowProvisioningUpdates \
              -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
              -authenticationKeyID "$ASC_KEY_ID" \
              -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              CODE_SIGN_STYLE=Automatic \
              ONLY_ACTIVE_ARCH=NO \
              archive

            # Inject teamID into ExportOptions.plist so Automatic signing resolves unambiguously
            sed -i '' "s|<key>signingStyle</key>|<key>teamID</key><string>$APPLE_TEAM_ID</string><key>signingStyle</key>|g" \
              "$REPO_ROOT/ExportOptions.plist"

            xcodebuild -exportArchive \
              -archivePath build/AACCboard.xcarchive \
              -exportPath /tmp/ipa \
              -exportOptionsPlist "$REPO_ROOT/ExportOptions.plist" \
              -allowProvisioningUpdates \
              -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
              -authenticationKeyID "$ASC_KEY_ID" \
              -authenticationKeyIssuerID "$ASC_ISSUER_ID"

            echo "Archive and export complete:"
            ls -lh /tmp/ipa/
      - store_artifacts:
          path: /Users/distiller/repo/platforms/ios/build/AACCboard.xcarchive
          destination: archive
      - store_artifacts:
          path: /tmp/ipa
          destination: ipa
      
workflows:
  version: 2.1
  build_cordova:
    jobs:
      - build_cboard:
          context: ccboard
          filters:
            branches:
              only: 
                - master
                - connect-ios-build-to-appstore
      - build_android:
          context: ccboard
          requires:
            - build_cboard
          filters:
            branches:
              only: 
                - master
      - build_electron:
          context: ccboard
          requires:
            - build_cboard
          filters:
            branches:
              only: 
                - master
      - build_ios:
          context: ccboard
          requires:
            - build_cboard
          filters:
            branches:
              only: 
                - master
                - connect-ios-build-to-appstore
